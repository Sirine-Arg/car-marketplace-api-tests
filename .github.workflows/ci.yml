name: API Tests - Car Marketplace

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: Run Tests (Mock Env)
        run: mvn clean test -Denv=mock

      - name: Generate Allure Report
        run: mvn allure:report

      - name: Upload Results
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: target/allure-results